name: Deploy site to GoDaddy

# Pushing to main syncs the site to GoDaddy hosting over FTPS.
# Requires three repository secrets (Settings > Secrets and variables > Actions):
#   FTP_SERVER    e.g. thenorthcreek.com  (or the server from cPanel > FTP Accounts)
#   FTP_USERNAME  the cPanel/FTP account username
#   FTP_PASSWORD  its password
# The sync is incremental — only changed files upload after the first run.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-godaddy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync files to GoDaddy over FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: public_html/
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            supabase/**
            .claude/**
            DEPLOY.txt
            DEPLOY_STAGING.txt
            DEPLOY_PRODUCTION.md
            README.md
            NorthCreek_Email_Previews.html
            create-stripe-links.sh
            stripe-links.txt
